<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイカイトラッカー — スプラトゥーン3 大会実績ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'M PLUS Rounded 1c', sans-serif; background: #0d0d12; color: #e8e8e8; min-height: 100vh; }
@keyframes fadeUp { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:translateY(0) } }
@keyframes glow { 0%,100%{box-shadow:0 0 8px rgba(255,215,0,.3)} 50%{box-shadow:0 0 22px rgba(255,215,0,.6)} }
::-webkit-scrollbar { width:6px } ::-webkit-scrollbar-thumb { background:#333; border-radius:3px }

.header { background: linear-gradient(135deg,#1a0a2e 0%,#0d0d12 50%,#0a1628 100%); border-bottom: 2px solid #E8E346; padding: 18px 20px; }
.h-inner { display:flex; justify-content:space-between; align-items:center; max-width:960px; margin:0 auto; flex-wrap:wrap; gap:10px; }
.h-left { display:flex; align-items:center; gap:12px; }
.logo { font-size:2.2rem; filter:drop-shadow(0 0 8px rgba(232,227,70,.5)); }
.title { font-size:1.5rem; font-weight:900; background:linear-gradient(90deg,#E8E346,#46E8B7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.sub { font-size:.7rem; color:#777; }
.badges { display:flex; gap:8px; flex-wrap:wrap; }
.badge { padding:3px 10px; border-radius:16px; border:1px solid #444; font-size:.68rem; color:#999; font-weight:700; }

.nav { display:flex; gap:4px; padding:10px 20px; max-width:960px; margin:0 auto; border-bottom:1px solid #1e1e28; flex-wrap:wrap; }
.nav-btn { padding:7px 16px; border-radius:8px; border:1px solid transparent; background:transparent; color:#777; font-size:.82rem; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; }
.nav-btn.active { background:rgba(232,227,70,.1); color:#E8E346; border-color:rgba(232,227,70,.3); }
.nav-btn.admin { color:#E85A46; }
.nav-btn.admin.active { background:rgba(232,90,70,.1); color:#E85A46; border-color:rgba(232,90,70,.3); }

.main { max-width:960px; margin:0 auto; padding:16px 20px; }

.search-wrap { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
.search-box { flex:1; position:relative; }
.s-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:.85rem; }
.s-input { width:100%; padding:9px 34px 9px 36px; border-radius:9px; border:1px solid #333; background:#1a1a22; color:#e8e8e8; font-size:.85rem; font-family:inherit; outline:none; }
.s-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:#666; cursor:pointer; }
.s-cnt { color:#555; font-size:.78rem; white-space:nowrap; }

.podium { display:flex; justify-content:center; align-items:flex-end; gap:10px; margin-bottom:24px; }
.pod-card { text-align:center; background:#14141e; border-radius:13px; padding:14px 16px; width:175px; border:1px solid #252530; cursor:pointer; transition:transform .2s; animation:fadeUp .5s ease both; }
.pod-card:hover { transform:translateY(-3px); }
.pod-card.first { width:210px; padding-bottom:28px; border-color:rgba(255,215,0,.3); background:#18180e; }
.pod-badge { display:inline-block; padding:3px 14px; border-radius:18px; font-size:.8rem; font-weight:900; margin-bottom:6px; }
.pod-badge.first { animation:glow 2s infinite; }
.pod-name { font-weight:900; margin-bottom:1px; }
.pod-id { color:#555; font-size:.72rem; font-family:monospace; }
.pod-pts { font-weight:900; margin:6px 0 3px; }
.pt-u { font-size:.55em; opacity:.6; }
.pod-stat { font-size:.72rem; color:#777; }

.tbl-wrap { border-radius:11px; overflow:hidden; border:1px solid #252530; background:#14141e; }
table { width:100%; border-collapse:collapse; }
th { text-align:left; padding:9px 12px; font-size:.7rem; color:#555; font-weight:700; border-bottom:1px solid #252530; }
tr.data { border-bottom:1px solid #1c1c26; cursor:pointer; transition:background .15s; }
tr.data:hover { background:rgba(255,255,255,.05); }
td { padding:9px 12px; font-size:.85rem; }
.rank-c { display:inline-block; width:26px; height:26px; line-height:26px; text-align:center; border-radius:50%; font-size:.75rem; font-weight:700; background:#252530; color:#777; }
.mini-stat { font-size:.72rem; color:#777; }

.overlay { position:fixed; inset:0; background:rgba(0,0,0,.72); display:flex; align-items:center; justify-content:center; z-index:1000; padding:16px; backdrop-filter:blur(3px); }
.modal { background:#18182a; border-radius:15px; padding:24px; max-width:540px; width:100%; max-height:82vh; overflow-y:auto; border:1px solid #333; position:relative; animation:fadeUp .3s ease; }
.m-close { position:absolute; top:12px; right:12px; background:none; border:none; color:#555; font-size:1rem; cursor:pointer; }
.m-head { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.m-avatar { font-size:2rem; width:50px; height:50px; display:flex; align-items:center; justify-content:center; background:#252540; border-radius:50%; }
.m-name { font-size:1.2rem; font-weight:900; }
.m-id { color:#777; font-family:monospace; font-size:.82rem; }
.m-aliases { font-size:.7rem; color:#666; margin-top:3px; }
.m-total { margin-left:auto; font-size:1.8rem; font-weight:900; color:#E8E346; }
.m-stats { display:flex; gap:10px; margin-bottom:20px; }
.m-stat-box { flex:1; text-align:center; background:#12121e; border-radius:9px; padding:8px 6px; }
.m-stat-n { font-size:1.3rem; font-weight:900; }
.m-stat-l { font-size:.68rem; color:#777; }
.m-sec { font-size:.82rem; color:#777; font-weight:700; margin-bottom:10px; padding-bottom:5px; border-bottom:1px solid #252530; }
.m-result { display:flex; align-items:center; gap:9px; padding:7px 10px; border-radius:7px; background:#12121e; margin-bottom:5px; }
.m-r-badge { padding:2px 9px; border-radius:5px; font-size:.7rem; font-weight:900; white-space:nowrap; }
.m-r-info { flex:1; }
.m-r-title { font-size:.82rem; font-weight:700; }
.m-r-meta { font-size:.68rem; color:#555; }
.m-r-pts { font-size:.85rem; font-weight:900; color:#E8E346; }

.sec-title { font-size:1.05rem; font-weight:900; margin-bottom:14px; }
.t-card { background:#14141e; border-radius:11px; border:1px solid #252530; margin-bottom:8px; overflow:hidden; animation:fadeUp .4s ease both; }
.t-head { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; cursor:pointer; }
.t-title { font-size:.95rem; font-weight:900; }
.t-meta { font-size:.72rem; color:#777; }
.t-body { padding:0 16px 16px; border-top:1px solid #252530; }
.place-badge { display:inline-block; padding:2px 10px; border-radius:5px; font-size:.75rem; font-weight:900; margin:14px 0 7px; }
.team-box { background:#1a1a28; border-radius:7px; padding:8px 12px; margin-bottom:5px; }
.team-n { font-weight:700; font-size:.88rem; margin-bottom:5px; }
.mem-list { display:flex; flex-wrap:wrap; gap:5px; }
.mem-chip { font-size:.72rem; padding:2px 9px; border-radius:16px; background:#252535; color:#bbb; }
.mem-id { color:#555; margin-left:3px; font-family:monospace; }

.card { background:#14141e; border-radius:11px; padding:20px; border:1px solid #252530; margin-bottom:16px; }
.set-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.set-label { width:110px; font-weight:700; font-size:.88rem; }
.set-input { width:70px; padding:5px 8px; border-radius:7px; border:1px solid #333; background:#1a1a22; color:#e8e8e8; font-size:.95rem; font-weight:700; font-family:inherit; text-align:center; }

.footer { max-width:960px; margin:0 auto; padding:18px 20px 28px; text-align:center; border-top:1px solid #1c1c26; }
.f-txt { font-size:.7rem; color:#444; }

.hidden { display:none; }

/* Admin styles */
.admin-section { margin-bottom:24px; }
.admin-desc { color:#888; font-size:.82rem; margin-bottom:12px; }
.admin-item { display:flex; align-items:center; gap:10px; padding:10px 14px; background:#14141e; border-radius:8px; margin-bottom:6px; border:1px solid #252530; }
.admin-item.excluded { opacity:.5; border-color:#E85A46; }
.admin-item.hidden-player { opacity:.5; border-color:#E85A46; }
.admin-item.renamed { border-color:#E8E346; }
.admin-item-title { flex:1; font-weight:700; font-size:.88rem; }
.admin-item-meta { color:#666; font-size:.72rem; }
.admin-toggle { padding:4px 12px; border-radius:6px; border:1px solid #444; background:transparent; color:#aaa; font-size:.72rem; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; }
.admin-toggle:hover { border-color:#E85A46; color:#E85A46; }
.admin-toggle.active { background:rgba(232,90,70,.15); border-color:#E85A46; color:#E85A46; }
.admin-select { padding:4px 8px; border-radius:6px; border:1px solid #444; background:#1a1a22; color:#e8e8e8; font-size:.8rem; font-family:inherit; }
.admin-badge { display:inline-block; padding:1px 8px; border-radius:10px; font-size:.65rem; font-weight:700; margin-left:6px; }
.admin-badge.warn { background:rgba(232,90,70,.15); color:#E85A46; }
.admin-badge.ok { background:rgba(70,232,183,.15); color:#46E8B7; }
.admin-reset { padding:6px 16px; border-radius:7px; border:1px solid #555; background:transparent; color:#aaa; font-size:.78rem; font-weight:700; cursor:pointer; font-family:inherit; margin-top:8px; }
.admin-reset:hover { border-color:#E85A46; color:#E85A46; }
</style>
</head>

// ===== ランキング計算（管理設定反映） =====
const PLACE_NAMES = {1:'優勝',2:'準優勝',3:'3位',4:'4位',5:'5位',6:'6位'};
function getAllTournaments() {
  // RAW + manualTournaments を統合し、同じ大会名+開催日はplacesをマージ
  const map = new Map();
  const addToMap = (t) => {
    const key = t.t + '::' + t.d;
    if (map.has(key)) {
      const existing = map.get(key);
      // 既存のvisiblePlaceセットを作成
      const existingPlaces = new Set(existing.p.map(p => p.v + '::' + p.tm));
      // 重複しないplacesのみ追加
      t.p.forEach(p => {
        const pKey = p.v + '::' + p.tm;
        if (!existingPlaces.has(pKey)) {
          existing.p.push(p);
          existingPlaces.add(pKey);
        }
      });
      // visiblePlaceでソート
      existing.p.sort((a,b) => a.v - b.v);
    } else {
      map.set(key, { t: t.t, d: t.d, p: [...t.p] });
    }
  };
  RAW.forEach(addToMap);
  (adminCfg.manualTournaments || []).forEach(addToMap);
  return [...map.values()];
}
function calcRanking() {
  const map = {};
  getAllTournaments().forEach(t => {
    if (isTournamentExcluded(t.t)) return;
    t.p.forEach(p => {
      const override = getPlaceOverride(t.t, p.tm);
      const effectivePlace = override !== undefined ? override : p.v;
      const effectivePlaceName = override !== undefined ? (PLACE_NAMES[override] || override+'位') : p.n;
      const pts = currentPT[effectivePlace] || 1;
      p.m.forEach(m => {
        if (isPlayerHidden(m.id)) return;
        const displayName = getDisplayName(m.id, m.c);
        if (!map[m.id]) map[m.id] = {id:m.id,name:displayName,pts:0,w:0,s:0,t3:0,t4:0,results:[],aliases:new Set()};
        map[m.id].pts += pts;
        map[m.id].aliases.add(m.n);
        map[m.id].name = displayName;
        if (effectivePlace===1) map[m.id].w++;
        else if (effectivePlace===2) map[m.id].s++;
        else if (effectivePlace===3) map[m.id].t3++;
        else if (effectivePlace===4) map[m.id].t4++;
        map[m.id].results.push({tour:t.t,date:t.d,place:effectivePlaceName,v:effectivePlace,team:p.tm,tn:m.n,pts});
      });
    });
  });
  return Object.values(map).map(p => ({...p,aliases:[...p.aliases]})).sort((a,b) => b.pts-a.pts || b.w-a.w);
}

  });

// ===== ランキング表示 =====
function renderRanking(filter='') {
  const players = filter ? ranking.filter(p => p.name.toLowerCase().includes(filter) || p.id.includes(filter) || p.aliases.some(a => a.toLowerCase().includes(filter))) : ranking;
  let html = `<div class="search-wrap"><div class="search-box"><span class="s-icon">🔍</span><input class="s-input" placeholder="プレイヤー名 / #数字 で検索..." value="${filter}" oninput="renderRanking(this.value)"></div><span class="s-cnt">${players.length}人</span></div>`;

  if (!filter && players.length >= 3) {
    html += '<div class="podium">';
    [1,0,2].forEach(idx => {
      const p = players[idx], rank = idx+1, col = COLORS[rank], big = rank===1;
      html += `<div class="pod-card${big?' first':''}" onclick="showPlayer('${p.id}')" style="animation-delay:${idx*.12}s">
        <div class="pod-badge${big?' first':''}" style="background:${col.bg};color:${col.t}">${EMOJI[rank]} ${rank}</div>
        <div class="pod-name" style="font-size:${big?'1.15rem':'.95rem'}">${p.name}</div>
        <div class="pod-id">#${p.id}</div>
        <div class="pod-pts" style="font-size:${big?'2.2rem':'1.7rem'};color:${col.bg}">${p.pts}<span class="pt-u">pt</span></div>
        <div class="pod-stat">🏆${p.w} 🥈${p.s} 🥉${p.t3}</div>
      </div>`;
    });
    html += '</div>';
  }

  html += '<div class="tbl-wrap"><table><thead><tr><th style="width:52px">#</th><th>プレイヤー</th><th style="width:72px">ID</th><th style="width:80px">ポイント</th><th style="width:130px">実績</th><th style="width:65px">大会数</th></tr></thead><tbody>';
  players.forEach((p, i) => {
    const globalRank = ranking.indexOf(p)+1;
    const col = COLORS[globalRank];
    html += `<tr class="data" onclick="showPlayer('${p.id}')" style="animation:fadeUp .3s ease ${i*.025}s both">
      <td><span class="rank-c" style="${col?`background:${col.bg};color:${col.t};font-weight:900`:''}">` + globalRank + `</span></td>
      <td style="font-weight:700">${p.name}</td>
      <td style="color:#777;font-family:monospace;font-size:.82rem">#${p.id}</td>
      <td style="font-weight:900;font-size:1.05rem;color:${col?.bg||'#E8E346'}">${p.pts}</td>
      <td><span class="mini-stat">🏆${p.w} 🥈${p.s} 🥉${p.t3} 🎮${p.t4}</span></td>
      <td>${p.results.length}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  document.getElementById('view-ranking').innerHTML = html;
}

// ===== プレイヤーモーダル =====
function showPlayer(id) {
  const p = ranking.find(x => x.id === id);
  if (!p) return;
  const col = COLORS;
  let html = `<div class="modal" onclick="event.stopPropagation()">
    <button class="m-close" onclick="closeModal()">✕</button>
    <div class="m-head">
      <div class="m-avatar">🦑</div>
      <div style="flex:1">
        <h2 class="m-name">${p.name}</h2>
        <span class="m-id">#${p.id}</span>
        ${p.aliases.length>1?`<div class="m-aliases">別名: ${p.aliases.filter(a=>a!==p.name).slice(0,5).join(', ')}</div>`:''}
      </div>
      <div class="m-total">${p.pts}<span class="pt-u">pt</span></div>
    </div>
    <div class="m-stats">
      ${[[p.w,'🏆 優勝'],[p.s,'🥈 準優勝'],[p.t3,'🥉 3位'],[p.results.length,'📋 参加']].map(([v,l])=>`<div class="m-stat-box"><div class="m-stat-n">${v}</div><div class="m-stat-l">${l}</div></div>`).join('')}
    </div>
    <h3 class="m-sec">大会戦績</h3>`;
  p.results.sort((a,b)=>b.date.localeCompare(a.date)).forEach(r => {
    const c = col[r.v];
    html += `<div class="m-result">
      <span class="m-r-badge" style="background:${c?.bg||'#555'};color:${c?.t||'#fff'}">${EMOJI[r.v]||'🎮'} ${r.place}</span>
      <div class="m-r-info"><div class="m-r-title">${r.tour}</div><div class="m-r-meta">${r.date} ・ ${r.team}${r.tn!==p.name?` ・ "${r.tn}"` : ''}</div></div>
      <div class="m-r-pts">+${r.pts}pt</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('modal-overlay').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

// ===== 大会一覧 =====
function renderTournaments() {
  let html = '';
  const sorted = [...getAllTournaments()].sort((a,b) => b.d.localeCompare(a.d));
  const isManual = (title, date) => (adminCfg.manualTournaments||[]).some(mt => mt.t === title && mt.d === date);
  const hasManualData = (title, date) => isManual(title, date);
  const isOnlyManual = (title, date) => !RAW.some(r => r.t === title && r.d === date) && isManual(title, date);
  html += `<h2 class="sec-title">大会一覧 (${sorted.length}大会)</h2>`;
  sorted.forEach((t, idx) => {
    const excluded = isTournamentExcluded(t.t);
    const total = t.p.reduce((s,p)=>s+p.m.length,0);
    html += `<div class="t-card" style="animation-delay:${idx*.08}s;${excluded?'opacity:.4':''}" >
      <div class="t-head" onclick="toggleTournament(${idx})">
        <div><h3 class="t-title">${t.t}${excluded?'<span class="admin-badge warn">除外</span>':''}${isOnlyManual(t.t,t.d)?'<span class="admin-badge ok">手動入力</span>':hasManualData(t.t,t.d)?'<span class="admin-badge ok">手動追加あり</span>':''}</h3><span class="t-meta">${t.d} ・ ${total}人参加</span></div>
        <span id="t-exp-${idx}">▶</span>
      </div>
      <div id="t-body-${idx}" class="t-body hidden">`;
    t.p.forEach(p => {
      const override = getPlaceOverride(t.t, p.tm);
      const ep = override !== undefined ? override : p.v;
      const epName = override !== undefined ? (PLACE_NAMES[ep] || ep+'位') : p.n;
      const c = COLORS[ep];
      const ptVal = currentPT[ep]||1;
      const changed = override !== undefined;
      html += `<div class="place-badge" style="background:${c?.bg||'#555'};color:${c?.t||'#fff'}">${EMOJI[ep]||'🎮'} ${epName} (${ptVal}pt)${changed?' <span style="font-size:.6rem;opacity:.7">← 元:'+p.n+'</span>':''}</div>
        <div class="team-box"><div class="team-n">${p.tm}</div><div class="mem-list">`;
      p.m.forEach(m => { html += `<span class="mem-chip">${m.n}<span class="mem-id">#${m.id}</span></span>`; });
      html += '</div></div>';
    });
    html += '</div></div>';
  });
  document.getElementById('view-tournaments').innerHTML = html;
}
function toggleTournament(idx) {
  const body = document.getElementById('t-body-'+idx);
  const exp = document.getElementById('t-exp-'+idx);
  body.classList.toggle('hidden');
  exp.textContent = body.classList.contains('hidden') ? '▶' : '▼';
}

// ===== ポイント設定 =====
function renderSettings() {
  const labels = {1:'🏆 優勝',2:'🥈 準優勝',3:'🥉 3位',4:'🎮 4位',5:'🎮 5位',6:'🎮 6位'};
  let html = `<h2 class="sec-title">ポイント設定</h2><div class="card"><p style="color:#888;font-size:.85rem;margin-bottom:20px">順位ごとのポイントを変更すると、ランキングにリアルタイム反映されます。</p>`;
  for (const [k,l] of Object.entries(labels)) {
    html += `<div class="set-row"><label class="set-label">${l}</label><input type="number" min="0" max="100" value="${currentPT[k]||0}" class="set-input" onchange="updatePoints(${k},this.value)"><span style="color:#888;font-size:.85rem">pt</span></div>`;
  }
  html += '</div>';
  document.getElementById('view-settings').innerHTML = html;
}
function updatePoints(place, val) {
  currentPT[place] = parseInt(val)||0;
  savePoints(currentPT);
  recalc();
}

// ===== 管理アクション =====
function toggleExcludeTournament(title) {
  const idx = adminCfg.excludedTournaments.indexOf(title);
  if (idx >= 0) adminCfg.excludedTournaments.splice(idx, 1);
  else adminCfg.excludedTournaments.push(title);
  saveAdmin(adminCfg);
  recalc();
  renderAdmin();
}

function setPlaceOverride(key, value, originalPlace) {
  if (value === '') {
    delete adminCfg.placeOverrides[key];
  } else {
    adminCfg.placeOverrides[key] = parseInt(value);
  }
  saveAdmin(adminCfg);
  recalc();
  renderAdmin();
}

function toggleHidePlayer(nameId) {
  const idx = adminCfg.hiddenPlayers.indexOf(nameId);
  if (idx >= 0) adminCfg.hiddenPlayers.splice(idx, 1);
  else adminCfg.hiddenPlayers.push(nameId);
  saveAdmin(adminCfg);
  recalc();
  renderAdmin();
}

function renamePlayer(nameId, newName) {
  if (newName && newName.trim()) {
    adminCfg.playerNames[nameId] = newName.trim();
  } else {
    delete adminCfg.playerNames[nameId];
  }
  saveAdmin(adminCfg);
  recalc();
  renderAdmin();
}

function resetAdmin() {
  if (!confirm('ブラウザ上の変更をリセットし、埋め込みデフォルトに戻しますか？')) return;
  adminCfg = getDefaultAdmin();
  saveAdmin(adminCfg);
  if (EMBEDDED_ADMIN.pointTable) {
    currentPT = {};
    for (const [k,v] of Object.entries(EMBEDDED_ADMIN.pointTable)) currentPT[parseInt(k)] = v;
  } else {
    currentPT = {...PT};
  }
  savePoints(currentPT);
  recalc();
  renderAdmin();
}

function exportAdminConfig() {
  const config = {
    excludedTournaments: adminCfg.excludedTournaments,
    placeOverrides: adminCfg.placeOverrides,
    hiddenPlayers: adminCfg.hiddenPlayers,
    playerNames: adminCfg.playerNames,
    manualTournaments: adminCfg.manualTournaments || [],
    pointTable: currentPT,
  };
  const json = JSON.stringify(config, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'admin_config.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ===== 手動大会入力 =====
window._mtPlaces = [];  // 入力中の順位データ

function addManualPlace() {
  const placeNum = window._mtPlaces.length + 1;
  window._mtPlaces.push({ v: placeNum, tm: '', members: '' });
  renderManualPlaces();
}

function renderManualPlaces() {
  const container = document.getElementById('mt-places');
  if (!container) return;
  let html = '';
  window._mtPlaces.forEach((p, i) => {
    const c = COLORS[p.v];
    html += `<div style="padding:10px;margin-bottom:8px;background:#12121e;border-radius:8px;border:1px solid #252530">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <select class="admin-select" onchange="window._mtPlaces[${i}].v=parseInt(this.value);renderManualPlaces()" style="width:100px">

      <div style="display:flex;align-items:center;gap:6px">

function parseMembers(str) {
  // "名前#ID, 名前#ID" or "名前, 名前" 形式をパース
  return str.split(',').map(s => s.trim()).filter(s => s).map(s => {
    const match = s.match(/^(.+?)#(\d+)$/);
    if (match) return { n: match[1].trim(), c: match[1].trim(), id: match[2] };
    return { n: s, c: s, id: '' };
  });
}

function saveManualTournament() {
  const title = document.getElementById('mt-title')?.value?.trim();
  const date = document.getElementById('mt-date')?.value?.trim();
  if (!title) { alert('大会名を入力してください'); return; }
  if (!date) { alert('開催日を入力してください'); return; }
  if (window._mtPlaces.length === 0) { alert('順位を1つ以上追加してください'); return; }

  const places = window._mtPlaces.map(p => {
    if (!p.tm.trim()) { alert('チーム名を入力してください'); return null; }
    const members = parseMembers(p.members);
    if (members.length === 0) { alert(`${PLACE_NAMES[p.v]||p.v+'位'}のメンバーを入力してください`); return null; }
    return {
      n: PLACE_NAMES[p.v] || p.v+'位',
      v: p.v,
      tm: p.tm.trim(),
      m: members,
    };
  });
  if (places.some(p => p === null)) return;

  const tournament = { t: title, d: date, p: places };
  if (!adminCfg.manualTournaments) adminCfg.manualTournaments = [];
  adminCfg.manualTournaments.push(tournament);
  saveAdmin(adminCfg);

  // Reset form
  window._mtPlaces = [];
  recalc();
  renderAdmin();
}

function removeManualTournament(idx) {
  if (!confirm('この手動入力大会を削除しますか？')) return;
  adminCfg.manualTournaments.splice(idx, 1);
  saveAdmin(adminCfg);
  recalc();
  renderAdmin();
}

// Init
showView('ranking');
</script>
